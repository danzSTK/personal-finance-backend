services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: personal-finance-api
    restart: always
    env_file:
      - ${API_ENV_FILE:-.env}
    environment:
      # Sobrescreve o .env: dentro do Docker, os hosts são os nomes dos serviços
      POSTGRES_HOST: ${POSTGRES_HOST}
      REDIS_HOST: redis
    ports:
      - "3000:3000"
    mem_limit: 512m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
  redis:
    image: redis:7-alpine
    container_name: personal-finance-redis
    restart: always
    # O comando abaixo ativa o AOF (Append Only File) para persistência
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 80mb --maxmemory-policy allkeys-lru
    mem_limit: 100m
    volumes:
      - redisdata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
