services:
  api:
    image: ghcr.io/danzstk/personal-finance-backend:${APP_VERSION:?APP_VERSION must be set}
    container_name: personal-finance-api
    restart: always
    env_file:
      - ${API_ENV_FILE:-.env}
    environment:
      # Redis usa a rede interna. PostgreSQL vem do env_file; o override local adiciona o container postgres.
      REDIS_HOST: redis
      BULLMQ_REDIS_HOST: bullmq-redis
      BULLMQ_REDIS_PORT: 6379
      BULLMQ_REDIS_PASSWORD: ${BULLMQ_REDIS_PASSWORD:-}
      PROCESS_ROLE: api
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: 0.50
    depends_on:
      redis:
        condition: service_healthy
      bullmq-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/liveness').then(response => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
  worker:
    image: ghcr.io/danzstk/personal-finance-backend:${APP_VERSION:?APP_VERSION must be set}
    container_name: personal-finance-worker
    restart: always
    command: ["node", "--max-old-space-size=400", "dist/worker.js"]
    env_file:
      - ${WORKER_ENV_FILE:-.env}
    environment:
      REDIS_HOST: redis
      BULLMQ_REDIS_HOST: bullmq-redis
      BULLMQ_REDIS_PORT: 6379
      BULLMQ_REDIS_PASSWORD: ${BULLMQ_REDIS_PASSWORD:-}
      PROCESS_ROLE: worker
    mem_limit: 512m
    cpus: 0.50
    depends_on:
      redis:
        condition: service_healthy
      bullmq-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "npm", "run", "health:worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
  redis:
    image: redis:8-alpine
    container_name: personal-finance-redis
    restart: always
    # O comando abaixo ativa o AOF (Append Only File) para persistência
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 80mb --maxmemory-policy allkeys-lru
    mem_limit: 100m
    volumes:
      - redisdata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  bullmq-redis:
    image: redis:8-alpine
    container_name: personal-finance-bullmq-redis
    restart: always
    command: >
      sh -c 'if [ -n "$$BULLMQ_REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$BULLMQ_REDIS_PASSWORD" --maxmemory 128mb --maxmemory-policy noeviction;
      else
        redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction;
      fi'
    environment:
      BULLMQ_REDIS_PASSWORD: ${BULLMQ_REDIS_PASSWORD:-}
    mem_limit: 160m
    ports:
      - "6381:6379"
    volumes:
      - bullmqredisdata:/data
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$BULLMQ_REDIS_PASSWORD" ]; then redis-cli -a "$$BULLMQ_REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  bullmqredisdata:

networks:
  app-network:
    driver: bridge
