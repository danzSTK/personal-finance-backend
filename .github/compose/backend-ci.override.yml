services:
  api:
    image: personal-finance-backend:container-smoke
    container_name: !reset null
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports: !override
      - target: 3000
        published: "0"
        protocol: tcp
        host_ip: 127.0.0.1

  worker:
    image: personal-finance-backend:container-smoke
    container_name: !reset null
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    container_name: !reset null
    restart: "no"
    ports: !reset []

  bullmq-redis:
    container_name: !reset null
    restart: "no"
    ports: !reset []
