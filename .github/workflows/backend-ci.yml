name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".env.exemple"
      - ".github/workflows/backend-ci.yml"
      - "!**/*.md"
  push:
    branches:
      - develop
      - main
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".env.exemple"
      - ".github/workflows/backend-ci.yml"
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash
    working-directory: api

jobs:
  # Job 1: verificacoes estaticas e compilacao.
  # Ele nao inicia banco, Redis ou a aplicacao.
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check lint
        run: npm run lint:check

      - name: Check TypeScript types
        run: npm run typecheck

      - name: Build application
        run: npm run build

  # Job 2: testes que nao dependem de Docker nem de servicos externos reais.
  tests:
    name: Unit and E2E tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov -- --runInBand

      - name: Run E2E tests
        run: npm run test:e2e -- --runInBand

  # Job 3: testes com infraestrutura real e descartavel.
  integration:
    name: Integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
