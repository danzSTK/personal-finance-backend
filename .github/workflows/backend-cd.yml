name: Backend CD

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/danzstk/personal-finance-backend

jobs:
  build-and-scan:
    name: Build and scan (${{ matrix.platform }})
    if: ${{ !github.event.release.prerelease }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact-suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact-suffix: arm64

    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=backend-cd-${{ matrix.artifact-suffix }}
          cache-to: type=gha,mode=max,scope=backend-cd-${{ matrix.artifact-suffix }}

      - name: Scan platform image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          timeout: 10m0s

      - name: Export approved digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${IMAGE_DIGEST#sha256:}"
          touch "${RUNNER_TEMP}/digests/${digest}"

      - name: Upload approved digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.artifact-suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-architecture image
    needs:
      - build-and-scan
    outputs:
      image_ref: ${{ steps.manifest.outputs.image_ref }}
      release_version: ${{ steps.manifest.outputs.release_version }}
      release_commit: ${{ steps.manifest.outputs.release_commit }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download approved digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release manifest
        id: manifest
        env:
          DIGEST_DIRECTORY: ${{ runner.temp }}/digests
          MANIFEST_METADATA_FILE: ${{ runner.temp }}/manifest-metadata.json
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mapfile -t digests < <(find "$DIGEST_DIRECTORY" -maxdepth 1 -type f -printf '%f\n' | sort)

          if [[ "${#digests[@]}" -ne 2 ]]; then
            echo "Expected 2 approved digests, found ${#digests[@]}" >&2
            exit 1
          fi

          sources=()
          for digest in "${digests[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid image digest: $digest" >&2
              exit 1
            fi
            sources+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
            --tag "${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}" \
            --metadata-file "$MANIFEST_METADATA_FILE" \
            "${sources[@]}"

          manifest_digest="$(jq -r '."containerimage.descriptor".digest // empty' "$MANIFEST_METADATA_FILE")"
          if [[ ! "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid manifest digest: ${manifest_digest:-missing}" >&2
            exit 1
          fi

          {
            echo "image_ref=${IMAGE_NAME}@${manifest_digest}"
            echo "release_version=${RELEASE_TAG}"
            echo "release_commit=${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify published platforms
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.image_ref }}
        run: |
          docker buildx imagetools inspect "$IMAGE_REF" --raw \
            | jq -e '
                ([.manifests[].platform | "\(.os)/\(.architecture)"] | index("linux/amd64") != null)
                and
                ([.manifests[].platform | "\(.os)/\(.architecture)"] | index("linux/arm64") != null)
              '
          docker buildx imagetools inspect "$IMAGE_REF"

      - name: Write publication summary
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.image_ref }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          {
            echo "### Published backend image"
            echo ""
            echo "- \`${IMAGE_NAME}:${RELEASE_TAG}\`"
            echo "- \`${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}\`"
            echo "- \`${IMAGE_REF}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to production
    needs:
      - publish-manifest
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      id-token: write
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      IMAGE_REF: ${{ needs.publish-manifest.outputs.image_ref }}
      RELEASE_VERSION: ${{ needs.publish-manifest.outputs.release_version }}
      RELEASE_COMMIT: ${{ needs.publish-manifest.outputs.release_commit }}
      PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
      PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Validate deployment configuration
        run: |
          if [[ ! "$IMAGE_REF" =~ ^ghcr\.io/danzstk/personal-finance-backend@sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid or missing IMAGE_REF." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid or missing RELEASE_VERSION." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid or missing RELEASE_COMMIT." >&2
            exit 1
          fi
          if [[ ! "$PRODUCTION_HOST" =~ ^[a-z0-9.-]+$ ]]; then
            echo "Invalid or missing PRODUCTION_HOST." >&2
            exit 1
          fi
          if [[ "$PRODUCTION_SSH_USER" != "deploy" ]]; then
            echo "PRODUCTION_SSH_USER must be deploy." >&2
            exit 1
          fi
          if [[ "$PRODUCTION_URL" != "https://api.danfy.app" ]]; then
            echo "PRODUCTION_URL must be https://api.danfy.app." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/deployment-diagnostics"

      - name: Connect ephemeral runner to Tailscale
        id: tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github-deploy
          ping: ${{ vars.PRODUCTION_HOST }}

      - name: Validate remote identity and privileges
        run: |
          remote_identity="$(timeout --signal=TERM --kill-after=5s 20s \
            tailscale ssh \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
            'id -un')"

          if [[ "$remote_identity" != "deploy" ]]; then
            echo "Unexpected remote identity: $remote_identity" >&2
            exit 1
          fi

          timeout --signal=TERM --kill-after=5s 20s \
            tailscale ssh \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
            'if id -nG | tr " " "\n" | grep -qx docker; then exit 1; fi; sudo -n -l /usr/local/sbin/danfy-backend-deploy >/dev/null'

      - name: Deploy immutable image
        id: deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set -o pipefail

          {
            printf '%s\n' "$GHCR_USERNAME"
            printf '%s\n' "$GHCR_TOKEN"
          } | timeout --signal=TERM --kill-after=10s 20m \
              tailscale ssh \
              "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
              "sudo -n /usr/local/sbin/danfy-backend-deploy deploy '${IMAGE_REF}' '${RELEASE_VERSION}' '${RELEASE_COMMIT}'" \
            2>&1 | tee "$RUNNER_TEMP/deployment-diagnostics/deploy.log"

      - name: Validate external readiness
        id: external_health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            "${PRODUCTION_URL}/health/readiness"

      - name: Roll back after external health failure
        id: external_rollback
        if: ${{ always() && steps.deploy.outcome == 'success' && steps.external_health.outcome == 'failure' }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set -o pipefail

          {
            printf '%s\n' "$GHCR_USERNAME"
            printf '%s\n' "$GHCR_TOKEN"
          } | timeout --signal=TERM --kill-after=10s 10m \
              tailscale ssh \
              "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
              'sudo -n /usr/local/sbin/danfy-backend-deploy rollback previous' \
            2>&1 | tee "$RUNNER_TEMP/deployment-diagnostics/rollback.log"

      - name: Collect remote deployment status
        if: ${{ always() && steps.tailscale.outcome == 'success' }}
        continue-on-error: true
        run: |
          set -o pipefail

          timeout --signal=TERM --kill-after=5s 20s \
            tailscale ssh \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
            'sudo -n /usr/local/sbin/danfy-backend-deploy status' \
            | tee "$RUNNER_TEMP/deployment-diagnostics/deployment-status.json"

      - name: Upload deployment diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-deploy-${{ github.event.release.tag_name }}
          path: ${{ runner.temp }}/deployment-diagnostics
          if-no-files-found: warn
          retention-days: 7

      - name: Write deployment summary
        if: ${{ success() }}
        run: |
          {
            echo "### Production deployment"
            echo ""
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Commit: \`${RELEASE_COMMIT}\`"
            echo "- URL: ${PRODUCTION_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
