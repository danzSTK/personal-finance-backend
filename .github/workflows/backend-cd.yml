name: Backend CD

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/danzstk/personal-finance-backend

jobs:
  build-and-scan:
    name: Build and scan (${{ matrix.platform }})
    if: ${{ !github.event.release.prerelease }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact-suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact-suffix: arm64

    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=backend-cd-${{ matrix.artifact-suffix }}
          cache-to: type=gha,mode=max,scope=backend-cd-${{ matrix.artifact-suffix }}

      - name: Scan platform image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          timeout: 10m0s

      - name: Export approved digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${IMAGE_DIGEST#sha256:}"
          touch "${RUNNER_TEMP}/digests/${digest}"

      - name: Upload approved digest
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: digests-${{ matrix.artifact-suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-architecture image
    needs:
      - build-and-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download approved digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release manifest
        env:
          DIGEST_DIRECTORY: ${{ runner.temp }}/digests
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mapfile -t digests < <(find "$DIGEST_DIRECTORY" -maxdepth 1 -type f -printf '%f\n' | sort)

          if [[ "${#digests[@]}" -ne 2 ]]; then
            echo "Expected 2 approved digests, found ${#digests[@]}" >&2
            exit 1
          fi

          sources=()
          for digest in "${digests[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid image digest: $digest" >&2
              exit 1
            fi
            sources+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
            --tag "${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}" \
            "${sources[@]}"

      - name: Verify published platforms
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}" --raw \
            | jq -e '
                ([.manifests[].platform | "\(.os)/\(.architecture)"] | index("linux/amd64") != null)
                and
                ([.manifests[].platform | "\(.os)/\(.architecture)"] | index("linux/arm64") != null)
              '
          docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}"

      - name: Write publication summary
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          {
            echo "### Published backend image"
            echo ""
            echo "- \`${IMAGE_NAME}:${RELEASE_TAG}\`"
            echo "- \`${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"
