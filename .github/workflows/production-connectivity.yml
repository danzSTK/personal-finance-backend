name: Production connectivity

on:
  workflow_dispatch:

concurrency:
  group: production-connectivity
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  connectivity:
    name: Validate Tailscale SSH access
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Validate production configuration
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          if [[ ! "$PRODUCTION_HOST" =~ ^[a-z0-9.-]+$ ]]; then
            echo "Invalid or missing PRODUCTION_HOST." >&2
            exit 1
          fi
          if [[ "$PRODUCTION_SSH_USER" != "deploy" ]]; then
            echo "PRODUCTION_SSH_USER must be deploy." >&2
            exit 1
          fi
          if [[ "$PRODUCTION_URL" != "https://api.danfy.app" ]]; then
            echo "PRODUCTION_URL must be https://api.danfy.app." >&2
            exit 1
          fi

      - name: Connect ephemeral runner to Tailscale
        id: tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github-deploy
          ping: ${{ vars.PRODUCTION_HOST }}

      - name: Validate remote identity and privileges
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
        run: |
          remote_identity="$(ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
            'id -un')"

          if [[ "$remote_identity" != "deploy" ]]; then
            echo "Unexpected remote identity: $remote_identity" >&2
            exit 1
          fi

          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}" \
            'if id -nG | tr " " "\n" | grep -qx docker; then exit 1; fi; sudo -n -l /usr/local/sbin/danfy-backend-deploy >/dev/null'

      - name: Read deployment status
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
        run: >-
          ssh -o BatchMode=yes -o ConnectTimeout=15
          "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}"
          'sudo -n /usr/local/sbin/danfy-backend-deploy status'

      - name: Collect status after failure
        if: ${{ always() && steps.tailscale.outcome == 'success' }}
        continue-on-error: true
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
        run: >-
          ssh -o BatchMode=yes -o ConnectTimeout=15
          "${PRODUCTION_SSH_USER}@${PRODUCTION_HOST}"
          'sudo -n /usr/local/sbin/danfy-backend-deploy status'
