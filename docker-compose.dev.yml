services:
  api:
    image: personal-finance-backend:${APP_VERSION:-local}
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      BULLMQ_REDIS_HOST: bullmq-redis
      BULLMQ_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: personal-finance-backend:${APP_VERSION:-local}
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      BULLMQ_REDIS_HOST: bullmq-redis
      BULLMQ_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: personal-finance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    ports:
      - "6379:6379"
